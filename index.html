<style>
:root{--bg:#070b09;--felt:#0f4a38;--gold:#e3b341;--ink:#eceae3;--mut:#9aa39c;--card:#0f1512;--line:#23302a;--no:#d8514b}
*{box-sizing:border-box;margin:0;padding:0}
body{background:radial-gradient(900px 500px at 50% -160px,#13261f,var(--bg) 60%);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;min-height:100vh;display:grid;place-items:center;padding:24px}
.gate{width:100%;max-width:380px;text-align:center}
.suit{color:var(--gold)}
.kick{letter-spacing:.3em;font-size:11px;color:var(--gold);text-transform:uppercase;font-weight:700;margin-bottom:14px}
h1{font-size:26px;font-weight:900;margin-bottom:6px}
p.sub{color:var(--mut);font-size:14px;margin-bottom:22px}
form{display:flex;flex-direction:column;gap:10px}
input{background:#0c1410;border:1px solid var(--line);color:var(--ink);padding:14px 16px;border-radius:12px;font-size:16px;text-align:center;outline:none}
input:focus{border-color:#2f6b53}
button{background:linear-gradient(180deg,#14543f,#0f4a38);color:var(--gold);border:1px solid #1c6b51;padding:13px;border-radius:12px;font-weight:800;font-size:15px;cursor:pointer}
button:disabled{opacity:.6;cursor:wait}
.err{color:var(--no);font-size:13px;min-height:18px;margin-top:4px}
.foot{color:var(--mut);font-size:11px;margin-top:20px;opacity:.7}
</style></head><body>

function b2u(s){return Uint8Array.from(atob(s),function(c){return c.charCodeAt(0)});}
async function open_(pw){
  var enc=new TextEncoder();
  var km=await crypto.subtle.importKey('raw',enc.encode(pw),'PBKDF2',false,['deriveKey']);
  var key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b2u(P.s),iterations:P.n,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
  var pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b2u(P.i)},key,b2u(P.c));
  return new TextDecoder().decode(pt);
}
document.getElementById('f').addEventListener('submit',async function(e){

  var b=document.getElementById('b'),er=document.getElementById('err');

    var html=await open_(document.getElementById('pw').value);

});
